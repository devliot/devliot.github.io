<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f8f9fa"/>
  <rect x="100" y="60" width="200" height="120" rx="8" fill="none" stroke="#333" stroke-width="2"/>
  <text x="200" y="125" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#333">Input Layer</text>
  <rect x="500" y="60" width="200" height="120" rx="8" fill="none" stroke="#333" stroke-width="2"/>
  <text x="600" y="125" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#333">Hidden Layer</text>
  <rect x="300" y="240" width="200" height="120" rx="8" fill="none" stroke="#333" stroke-width="2"/>
  <text x="400" y="305" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#333">Output Layer</text>
  <line x1="300" y1="120" x2="500" y2="120" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="180" x2="500" y2="240" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="200" y1="180" x2="300" y2="240" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>
</svg>
